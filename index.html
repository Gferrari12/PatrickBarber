<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Patrick Barber</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .svc {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>💈 Patrick Barber</h1>

<div class="card">
  <h3>Agendamento</h3>

  <input type="text" id="clientName" placeholder="Seu nome">

  <input type="date" id="date">

  <input type="time" id="time">

  <div id="services"></div>

  <button onclick="confirmBooking()">Agendar</button>
</div>

<div class="card">
  <h3>Agendamentos</h3>
  <div id="appointmentsList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import "./config.js";

const app = initializeApp(window.PB_CONFIG.firebase);
const db = getFirestore(app);

let bookings = {};

// 🔧 Render serviços
const servicesDiv = document.getElementById("services");

window.PB_CONFIG.servicos.forEach(s => {
  const div = document.createElement("div");
  div.className = "svc";

  div.innerHTML = `
    <label>
      <input type="checkbox" class="svc-check" value="${s.preco}" data-name="${s.nome}">
      ${s.nome}
    </label>
    <span>R$ ${s.preco}</span>
  `;

  servicesDiv.appendChild(div);
});

// 📅 Confirmar
window.confirmBooking = async function(){

  const name = document.getElementById('clientName').value.trim();
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;

  if(!name || !date || !time){
    return alert("Preencha todos os campos");
  }

  const key = `${date}|${time}`;

  if(bookings[key]){
    return alert("Horário ocupado");
  }

  const servicos = Array.from(document.querySelectorAll('.svc-check:checked'))
    .map(el => el.getAttribute('data-name'));

  if(!servicos.length){
    return alert("Selecione serviços");
  }

  let total = 0;
  document.querySelectorAll('.svc-check:checked').forEach(el=>{
    total += parseInt(el.value);
  });

  const data = {
    name,
    services: servicos,
    total,
    date,
    slot: time,
    key
  };

  try{
    await setDoc(doc(db, 'agendamentos', key), data);

    alert("✅ Agendado!");
    loadBookings();

  }catch(e){
    console.error(e);
    alert("Erro ao salvar");
  }
};

// 📥 Carregar
async function loadBookings(){
  bookings = {};

  const snap = await getDocs(collection(db, 'agendamentos'));

  snap.forEach(doc=>{
    bookings[doc.id] = doc.data();
  });

  render();
}

// 📋 Render
function render(){
  const list = document.getElementById('appointmentsList');
  list.innerHTML = "";

  Object.values(bookings).forEach(b=>{
    const div = document.createElement('div');
    div.className = "card";

    div.innerHTML = `
      <b>${b.name}</b><br>
      ${b.date} - ${b.slot}<br>
      ${b.services.join(", ")}<br>
      R$ ${b.total}
    `;

    list.appendChild(div);
  });
}

loadBookings();

</script>

</body>
</html>
